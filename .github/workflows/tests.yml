name: Tests

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      live_openai_smoke:
        description: "Run live OpenAI GPT-4.1 Nano add-on smoke test"
        required: false
        type: boolean
        default: false

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}/agentic_prompt_app
    defaults:
      run:
        working-directory: agentic_prompt_app
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest ruff

      - name: Run Ruff
        run: ruff check .

      - name: Run Ruff Format Check
        run: |
          ruff format --diff . || true
          ruff format --check .

      - name: Start Flask app and check health
        run: |
          set -euo pipefail
          python -m flask --app app run --host 127.0.0.1 --port 5056 > /tmp/flask.log 2>&1 &
          FLASK_PID=$!
          cleanup() {
            kill "$FLASK_PID" || true
            wait "$FLASK_PID" || true
          }
          trap cleanup EXIT

          for i in {1..30}; do
            if curl -sSf http://127.0.0.1:5056/api/health > /dev/null; then
              echo "Flask health check passed"
              curl -sSf http://127.0.0.1:5056/api/config-status > /dev/null
              curl -sSf http://127.0.0.1:5056/api/diagnostics > /dev/null
              curl -sSf http://127.0.0.1:5056/static/styles.css > /dev/null
              curl -sSf http://127.0.0.1:5056/static/app.js > /dev/null
              exit 0
            fi
            sleep 0.5
          done
          echo "Flask health check failed"
          cat /tmp/flask.log || true
          exit 1

      - name: Run tests
        run: pytest -q

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        platform: ["linux/amd64", "linux/arm64"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker buildx build \
            --platform "${{ matrix.platform }}" \
            -f agentic_prompt_app/Dockerfile \
            -t agentic-prompt-app-addon:ci \
            agentic_prompt_app

  browser-ui:
    runs-on: ubuntu-latest
    needs: test
    env:
      PYTHONPATH: ${{ github.workspace }}/agentic_prompt_app
    defaults:
      run:
        working-directory: agentic_prompt_app
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-playwright playwright
          python -m playwright install --with-deps chromium

      - name: Run Browser UI Check
        env:
          RUN_BROWSER_TESTS: "1"
          BROWSER_BASE_URL: http://127.0.0.1:5056
          CHAT_STORE_PATH: ${{ runner.temp }}/chat_history.json
          SENSOR_MAP_PATH: ${{ runner.temp }}/sensor_map.json
        run: |
          set -euo pipefail
          python -m flask --app app run --host 127.0.0.1 --port 5056 > /tmp/flask.log 2>&1 &
          FLASK_PID=$!
          cleanup() {
            kill "$FLASK_PID" || true
            wait "$FLASK_PID" || true
          }
          trap cleanup EXIT

          for i in {1..30}; do
            if curl -sSf http://127.0.0.1:5056/api/health > /dev/null; then
              break
            fi
            sleep 1
          done
          if ! curl -sSf http://127.0.0.1:5056/api/health > /dev/null; then
            echo "Flask app did not become ready for browser smoke test"
            cat /tmp/flask.log || true
            exit 1
          fi

          pytest tests/test_browser_ui.py -q

  addon-install:
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - name: Start Supervisor Devcontainer
        run: |
          set -euo pipefail
          CONTAINER=ha-addon-dev
          docker run -d --name "$CONTAINER" --privileged \
            -e GIT_EDITOR="code --wait" \
            -e WORKSPACE_DIRECTORY="/workspaces/${{ github.event.repository.name }}" \
            -v "${{ github.workspace }}:/workspaces/${{ github.event.repository.name }}" \
            -v /var/lib/docker \
            -v /mnt/supervisor \
            --entrypoint bash \
            ghcr.io/home-assistant/devcontainer:2-addons -lc "sleep infinity"
          docker exec "$CONTAINER" bash -lc "sudo chmod a+x /usr/bin/supervisor_* /usr/bin/ha || true"
          docker exec "$CONTAINER" bash -lc "sudo -E bash devcontainer_bootstrap"
          docker exec "$CONTAINER" bash -lc "sudo sed -i 's/stty sane/stty sane || true/' /etc/supervisor_scripts/common"
          docker exec "$CONTAINER" bash -lc "sudo -E supervisor_run >/tmp/supervisor_run.log 2>&1 & echo \$! >/tmp/supervisor_run.pid"

          echo "Waiting for Supervisor..."
          for i in {1..60}; do
            if docker exec "$CONTAINER" bash -lc "ha --no-progress supervisor info" > /dev/null 2>&1; then
              echo "Supervisor is ready"
              exit 0
            fi
            if ! docker exec "$CONTAINER" bash -lc "kill -0 \$(cat /tmp/supervisor_run.pid)" > /dev/null 2>&1; then
              echo "supervisor_run exited before Supervisor became ready"
              docker exec "$CONTAINER" bash -lc "tail -n 200 /tmp/supervisor_run.log" || true
              exit 1
            fi
            sleep 10
          done
          echo "Supervisor did not become ready in time"
          docker exec "$CONTAINER" bash -lc "tail -n 200 /tmp/supervisor_run.log" || true
          docker exec "$CONTAINER" bash -lc "docker ps -a" || true
          exit 1

      - name: Install And Start Add-on
        run: |
          set -euo pipefail
          CONTAINER=ha-addon-dev
          docker exec "$CONTAINER" bash -lc "ha --no-progress jobs options --ignore-conditions healthy"

          if docker exec "$CONTAINER" bash -lc "ha --no-progress addons install agentic_prompt_app"; then
            SLUG=agentic_prompt_app
          elif docker exec "$CONTAINER" bash -lc "ha --no-progress addons install local_agentic_prompt_app"; then
            SLUG=local_agentic_prompt_app
          else
            echo "Failed to install add-on (agentic_prompt_app or local_agentic_prompt_app)"
            exit 1
          fi

          docker exec "$CONTAINER" bash -lc "ha --no-progress addons start $SLUG"
          docker exec "$CONTAINER" bash -lc "ha --no-progress addons info $SLUG" | grep -q "state: started"
          echo "$SLUG" > /tmp/addon_slug

      - name: Verify Add-on Health Endpoint
        run: |
          set -euo pipefail
          CONTAINER=ha-addon-dev
          SLUG="$(cat /tmp/addon_slug)"
          ADDON_CONTAINER=""
          for i in $(seq 1 60); do
            ADDON_CONTAINER="$(
              docker exec "$CONTAINER" bash -lc \
                "docker ps --format '{{.Names}} {{.Image}}' | awk '/agentic_prompt_app|local_agentic_prompt_app/ { print \$1; exit }'"
            )"
            if [ -n "$ADDON_CONTAINER" ]; then
              break
            fi
            sleep 5
          done

          if [ -z "$ADDON_CONTAINER" ]; then
            echo "Could not find started add-on container for $SLUG"
            docker exec "$CONTAINER" bash -lc "docker ps -a" || true
            exit 1
          fi

          for i in $(seq 1 30); do
            if docker exec "$CONTAINER" bash -lc "docker exec '$ADDON_CONTAINER' sh -lc '
              if command -v curl >/dev/null 2>&1; then
                curl --max-time 10 -fsS http://127.0.0.1:5000/api/health &&
                curl --max-time 10 -fsS http://127.0.0.1:5000/api/config-status &&
                curl --max-time 10 -fsS http://127.0.0.1:5000/api/diagnostics &&
                curl --max-time 10 -fsS http://127.0.0.1:5000/static/styles.css &&
                curl --max-time 10 -fsS http://127.0.0.1:5000/static/app.js
              elif command -v wget >/dev/null 2>&1; then
                wget -T 10 -qO- http://127.0.0.1:5000/api/health &&
                wget -T 10 -qO- http://127.0.0.1:5000/api/config-status &&
                wget -T 10 -qO- http://127.0.0.1:5000/api/diagnostics &&
                wget -T 10 -qO- http://127.0.0.1:5000/static/styles.css &&
                wget -T 10 -qO- http://127.0.0.1:5000/static/app.js
              else
                python -c \"import urllib.request; r = urllib.request.urlopen('http://127.0.0.1:5000/api/health', timeout=10); print(r.read().decode()); raise SystemExit(0 if r.status == 200 else r.status)\"
              fi
            '"; then
              echo "Verified add-on health endpoint"
              exit 0
            fi
            sleep 5
          done

          echo "Add-on health endpoint did not respond"
          docker exec "$CONTAINER" bash -lc "docker logs '$ADDON_CONTAINER'" || true
          exit 1

      - name: Dump Supervisor Logs (on failure)
        if: failure()
        run: |
          docker ps -a || true
          docker inspect ha-addon-dev || true
          docker logs ha-addon-dev || true
          docker exec ha-addon-dev bash -lc "tail -n 200 /tmp/supervisor_run.log" || true
          docker exec ha-addon-dev bash -lc "docker ps -a" || true
          docker exec ha-addon-dev bash -lc "ha --no-progress supervisor logs --lines 200" || true

  live-openai-addon-smoke:
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 35
    if: github.event_name == 'workflow_dispatch' && inputs.live_openai_smoke == true
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Start Supervisor Devcontainer
        run: |
          set -euo pipefail
          CONTAINER=ha-addon-dev
          docker run -d --name "$CONTAINER" --privileged \
            -e GIT_EDITOR="code --wait" \
            -e WORKSPACE_DIRECTORY="/workspaces/${{ github.event.repository.name }}" \
            -v "${{ github.workspace }}:/workspaces/${{ github.event.repository.name }}" \
            -v /var/lib/docker \
            -v /mnt/supervisor \
            --entrypoint bash \
            ghcr.io/home-assistant/devcontainer:2-addons -lc "sleep infinity"
          docker exec "$CONTAINER" bash -lc "sudo chmod a+x /usr/bin/supervisor_* /usr/bin/ha || true"
          docker exec "$CONTAINER" bash -lc "sudo -E bash devcontainer_bootstrap"
          docker exec "$CONTAINER" bash -lc "sudo sed -i 's/stty sane/stty sane || true/' /etc/supervisor_scripts/common"
          docker exec "$CONTAINER" bash -lc "sudo -E supervisor_run >/tmp/supervisor_run.log 2>&1 & echo \$! >/tmp/supervisor_run.pid"

          echo "Waiting for Supervisor..."
          for i in {1..60}; do
            if docker exec "$CONTAINER" bash -lc "ha --no-progress supervisor info" > /dev/null 2>&1; then
              echo "Supervisor is ready"
              exit 0
            fi
            if ! docker exec "$CONTAINER" bash -lc "kill -0 \$(cat /tmp/supervisor_run.pid)" > /dev/null 2>&1; then
              echo "supervisor_run exited before Supervisor became ready"
              docker exec "$CONTAINER" bash -lc "tail -n 200 /tmp/supervisor_run.log" || true
              exit 1
            fi
            sleep 10
          done
          echo "Supervisor did not become ready in time"
          docker exec "$CONTAINER" bash -lc "tail -n 200 /tmp/supervisor_run.log" || true
          docker exec "$CONTAINER" bash -lc "docker ps -a" || true
          exit 1

      - name: Seed Fake Home Assistant Data
        run: |
          set -euo pipefail
          CONTAINER=ha-addon-dev
          if [ -z "${OPENAI_API_KEY:-}" ]; then
            echo "OPENAI_API_KEY repository secret is required for live_openai_smoke."
            exit 1
          fi
          echo "::add-mask::$OPENAI_API_KEY"

          SECRET_FILE="${RUNNER_TEMP}/secrets.yaml"
          RECORDER_DB="${RUNNER_TEMP}/home-assistant_v2.db"
          printf 'openai_api_key: %s\n' "$OPENAI_API_KEY" > "$SECRET_FILE"
          python3 - <<'PY'
          import os
          import sqlite3
          import time
          from pathlib import Path

          db_path = Path(os.environ["RUNNER_TEMP"]) / "home-assistant_v2.db"
          now = time.time()
          with sqlite3.connect(db_path) as connection:
              connection.execute(
                  "CREATE TABLE states_meta (metadata_id INTEGER PRIMARY KEY, entity_id VARCHAR(255))"
              )
              connection.execute(
                  """
                  CREATE TABLE states (
                      state_id INTEGER PRIMARY KEY,
                      state VARCHAR(255),
                      last_updated_ts FLOAT,
                      metadata_id INTEGER
                  )
                  """
              )
              fake_entities = {
                  "sensor.nick_r_steps": (4200, 5100, 6300, 5800, 7100, 6900, 7500),
                  "sensor.jelly_star_daily_steps": (2300, 3400, 4100, 3900, 4500, 5200, 6100),
                  "sensor.nutribullet_plug_current": (0, 0, 1.2, 3.4, 0.5, 0, 0),
                  "sensor.nutribullet_plug_voltage": (120, 121, 121, 120, 121, 120, 120),
                  "sensor.nutribullet_plug_today_s_consumption": (0.01, 0.01, 0.04, 0.06, 0.06, 0.07, 0.07),
              }
              state_id = 1
              for metadata_id, (entity_id, values) in enumerate(fake_entities.items(), start=1):
                  connection.execute(
                      "INSERT INTO states_meta (metadata_id, entity_id) VALUES (?, ?)",
                      (metadata_id, entity_id),
                  )
                  for index, value in enumerate(values):
                      connection.execute(
                          "INSERT INTO states (state_id, state, last_updated_ts, metadata_id) VALUES (?, ?, ?, ?)",
                          (state_id, str(value), now - (len(values) - index) * 86400, metadata_id),
                      )
                      state_id += 1
          PY

          docker exec "$CONTAINER" bash -lc "mkdir -p /mnt/supervisor/homeassistant"
          docker cp "$SECRET_FILE" "$CONTAINER":/mnt/supervisor/homeassistant/secrets.yaml
          docker cp "$RECORDER_DB" "$CONTAINER":/mnt/supervisor/homeassistant/home-assistant_v2.db
          docker exec "$CONTAINER" bash -lc "chmod 600 /mnt/supervisor/homeassistant/secrets.yaml"
          docker exec "$CONTAINER" bash -lc "ls -l /mnt/supervisor/homeassistant/home-assistant_v2.db /mnt/supervisor/homeassistant/secrets.yaml"

      - name: Install And Start Add-on
        run: |
          set -euo pipefail
          CONTAINER=ha-addon-dev
          docker exec "$CONTAINER" bash -lc "ha --no-progress jobs options --ignore-conditions healthy"

          if docker exec "$CONTAINER" bash -lc "ha --no-progress addons install agentic_prompt_app"; then
            SLUG=agentic_prompt_app
          elif docker exec "$CONTAINER" bash -lc "ha --no-progress addons install local_agentic_prompt_app"; then
            SLUG=local_agentic_prompt_app
          else
            echo "Failed to install add-on (agentic_prompt_app or local_agentic_prompt_app)"
            exit 1
          fi

          docker exec "$CONTAINER" bash -lc "ha --no-progress addons start $SLUG"
          docker exec "$CONTAINER" bash -lc "ha --no-progress addons info $SLUG" | grep -q "state: started"
          echo "$SLUG" > /tmp/addon_slug

      - name: Run Four-Call GPT-4.1 Nano Smoke
        run: |
          set -euo pipefail
          CONTAINER=ha-addon-dev
          ADDON_CONTAINER=""
          for i in $(seq 1 60); do
            ADDON_CONTAINER="$(
              docker exec "$CONTAINER" bash -lc \
                "docker ps --format '{{.Names}} {{.Image}}' | awk '/agentic_prompt_app|local_agentic_prompt_app/ { print \$1; exit }'"
            )"
            if [ -n "$ADDON_CONTAINER" ]; then
              break
            fi
            sleep 5
          done

          if [ -z "$ADDON_CONTAINER" ]; then
            echo "Could not find started add-on container"
            docker exec "$CONTAINER" bash -lc "docker ps -a" || true
            exit 1
          fi

          docker exec "$CONTAINER" bash -lc "docker exec '$ADDON_CONTAINER' python3 - <<'PY'
          import json
          import sys
          import urllib.error
          import urllib.request

          BASE_URL = 'http://127.0.0.1:5000'
          MODEL = 'gpt-4.1-nano'
          MAX_GPT_CALLS = 4
          gpt_call_count = 0

          opener = urllib.request.build_opener(urllib.request.HTTPCookieProcessor())

          def request_json(path, method='GET', payload=None):
              data = None
              headers = {'Accept': 'application/json'}
              if payload is not None:
                  data = json.dumps(payload).encode('utf-8')
                  headers['Content-Type'] = 'application/json'
              request = urllib.request.Request(
                  BASE_URL + path,
                  data=data,
                  headers=headers,
                  method=method,
              )
              try:
                  with opener.open(request, timeout=120) as response:
                      body = response.read().decode('utf-8')
                      return response.status, json.loads(body) if body else {}
              except urllib.error.HTTPError as exc:
                  body = exc.read().decode('utf-8', errors='replace')
                  try:
                      parsed = json.loads(body)
                  except json.JSONDecodeError:
                      parsed = {'raw': body[:400]}
                  return exc.code, parsed

          def assert_ok(condition, message):
              if not condition:
                  raise AssertionError(message)

          def send_gpt_prompt(chat_id, prompt):
              global gpt_call_count
              if gpt_call_count >= MAX_GPT_CALLS:
                  raise AssertionError('Refusing to call GPT more than 4 times')
              gpt_call_count += 1
              status, data = request_json(
                  '/api/message',
                  method='POST',
                  payload={
                      'message': prompt,
                      'provider': 'openai',
                      'model': MODEL,
                      'chat_id': chat_id,
                  },
              )
              assert_ok(status == 200, f'GPT call {gpt_call_count} failed with {status}: {data}')
              assert_ok(data.get('provider') == 'openai', data)
              assert_ok(data.get('model') == MODEL, data)
              assert_ok((data.get('assistant') or '').strip(), data)
              return data

          for path in (
              '/api/health',
              '/api/config-status',
              '/api/diagnostics',
              '/static/styles.css',
              '/static/app.js',
          ):
              request = urllib.request.Request(BASE_URL + path, headers={'Accept': '*/*'})
              with opener.open(request, timeout=30) as response:
                  assert_ok(response.status == 200, f'{path} returned {response.status}')
                  response.read()

          status, sensor_map = request_json(
              '/api/sensor-map',
              method='PUT',
              payload={
                  'sensors': [
                      {
                          'sensor': 'sensor.fake_sleep_minutes_asleep',
                          'description': 'Fake sleep minutes asleep',
                      },
                      {
                          'sensor': 'sensor.fake_sleep_efficiency',
                          'description': 'Fake sleep efficiency percentage',
                      },
                      {
                          'sensor': 'binary_sensor.fake_pantry_door',
                          'description': 'Fake pantry door open/closed state',
                      },
                      {
                          'sensor': 'sensor.fake_kitchen_motion_count',
                          'description': 'Fake kitchen motion count',
                      },
                  ],
              },
          )
          assert_ok(status == 200, sensor_map)
          assert_ok(len(sensor_map.get('sensors', [])) == 4, sensor_map)

          status, chat = request_json('/api/chats', method='POST')
          assert_ok(status == 201, chat)
          sensor_map_chat_id = chat['active_chat_id']
          status, add_prompt = request_json(
              '/api/message',
              method='POST',
              payload={
                  'message': 'I think I have something along the lines of sensor.nick_r_Steps could you add it to the sensor map?',
                  'provider': 'openai',
                  'model': MODEL,
                  'chat_id': sensor_map_chat_id,
              },
          )
          assert_ok(status == 200, add_prompt)
          assert_ok('Do you want me to add it' in add_prompt.get('assistant', ''), add_prompt)
          status, unchanged_map = request_json('/api/sensor-map')
          assert_ok(status == 200, unchanged_map)
          assert_ok(len(unchanged_map.get('sensors', [])) == 4, unchanged_map)

          status, confirm_add = request_json(
              '/api/message',
              method='POST',
              payload={
                  'message': 'yes, add it',
                  'provider': 'openai',
                  'model': MODEL,
                  'chat_id': sensor_map_chat_id,
              },
          )
          assert_ok(status == 200, confirm_add)
          assert_ok('sensor.nick_r_steps' in confirm_add.get('assistant', ''), confirm_add)
          status, updated_map = request_json('/api/sensor-map')
          assert_ok(status == 200, updated_map)
          updated_sensors = {row['sensor'] for row in updated_map.get('sensors', [])}
          assert_ok('sensor.nick_r_steps' in updated_sensors, updated_map)
          assert_ok(len(updated_sensors) == 5, updated_map)

          status, delete_guidance = request_json(
              '/api/message',
              method='POST',
              payload={
                  'message': 'Can you delete this add-on app for me?',
                  'provider': 'openai',
                  'model': MODEL,
              },
          )
          assert_ok(status == 200, delete_guidance)
          assert_ok('manually in Home Assistant' in delete_guidance.get('assistant', ''), delete_guidance)
          assert_ok(gpt_call_count == 0, f'Deterministic sensor-map/app actions must not call GPT; got {gpt_call_count}')

          chat_ids = []
          for _ in range(4):
              status, chat = request_json('/api/chats', method='POST')
              assert_ok(status == 201, chat)
              chat_ids.append(chat['active_chat_id'])

          prompts = [
              (
                  'I think I have steps data somewhere in my home assistant data, can you find it for me?',
                  ['sensor.nick_r_steps', 'sensor.jelly_star_daily_steps'],
              ),
              (
                  'I think have a nutribullet sensor which collects amps, could you check my sensors for me',
                  ['sensor.nutribullet_plug_current'],
              ),
              (
                  'In one short sentence, describe what the fake pantry door sensor tracks.',
                  [],
              ),
              (
                  'In one short sentence, describe what fake kitchen motion count tracks.',
                  [],
              ),
          ]
          for chat_id, (prompt, expected_entities) in zip(chat_ids, prompts):
              data = send_gpt_prompt(chat_id, prompt)
              catalog = (data.get('home_assistant_context') or {}).get('sensor_catalog_search') or {}
              matches = {row.get('entity_id') for row in catalog.get('matches', [])}
              for entity_id in expected_entities:
                  assert_ok(entity_id in matches, {'expected': entity_id, 'matches': sorted(matches), 'prompt': prompt})

          assert_ok(gpt_call_count == 4, f'Expected exactly 4 GPT calls, got {gpt_call_count}')

          for chat_id in chat_ids[:2]:
              status, data = request_json(f'/api/chats/{chat_id}', method='PATCH', payload={'pinned': True})
              assert_ok(status == 200, data)

          status, data = request_json('/api/chats')
          assert_ok(status == 200, data)
          returned = data.get('chats', [])
          assert_ok([chat['id'] for chat in returned[:2]] == chat_ids[:2], returned)
          assert_ok(all(chat.get('pinned') for chat in returned[:2]), returned)

          deleted_id = chat_ids[3]
          status, data = request_json(f'/api/chats/{deleted_id}', method='DELETE')
          assert_ok(status == 200, data)
          remaining_ids = {chat['id'] for chat in data.get('chats', [])}
          assert_ok(deleted_id not in remaining_ids, data)

          assert_ok(gpt_call_count == 4, f'Pin/delete must not call GPT; got {gpt_call_count}')
          print(json.dumps({'ok': True, 'gpt_call_count': gpt_call_count, 'model': MODEL}, sort_keys=True))
          PY"

      - name: Dump Supervisor Logs (on failure)
        if: failure()
        run: |
          docker ps -a || true
          docker inspect ha-addon-dev || true
          docker logs ha-addon-dev || true
          docker exec ha-addon-dev bash -lc "tail -n 200 /tmp/supervisor_run.log" || true
          docker exec ha-addon-dev bash -lc "docker ps -a" || true
          docker exec ha-addon-dev bash -lc "ha --no-progress supervisor logs --lines 200" || true
