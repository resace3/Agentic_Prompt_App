name: Lint and Security

on:
  push:
  pull_request:
  workflow_dispatch:

# This workflow only needs to read repository contents.
permissions:
  contents: read

concurrency:
  group: lint-security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-security:
    name: Lint, dependency, and security checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        shell: bash

    steps:
      # Version-pinned first-party actions avoid floating branch refs.
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: agentic_prompt_app/requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Verifies the add-on dependencies can be installed together and have
      # no broken package metadata before later lint checks run.
      - name: Install Python dependencies and check package metadata
        working-directory: agentic_prompt_app
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install ruff
          python -m pip check
          python - <<'PY'
          import flask
          import matplotlib
          import openai
          import yaml

          print("Dependency import sanity check passed")
          PY

      # Verifies Python syntax, imports, and the formatting contract enforced
      # by the repo's pyproject.toml.
      - name: Run Ruff lint and format checks
        working-directory: agentic_prompt_app
        run: |
          set -euo pipefail
          ruff check .
          ruff format --check .

      # Verifies committed frontend JavaScript parses before browser tests run.
      - name: Check static JavaScript syntax
        run: |
          set -euo pipefail
          node --check agentic_prompt_app/static/app.js

      # Verifies shell entrypoints use portable, parseable shell syntax.
      - name: Run ShellCheck on shell scripts
        run: |
          set -euo pipefail
          if ! command -v shellcheck >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y shellcheck
          fi

          mapfile -t scripts < <(git ls-files '*.sh')
          if [ "${#scripts[@]}" -eq 0 ]; then
            echo "No shell scripts found"
            exit 0
          fi

          shellcheck "${scripts[@]}"

      # Scans only high-confidence secret formats and prints path/line/pattern
      # metadata instead of matched values, so CI logs do not disclose secrets.
      - name: Scan for committed secrets
        run: |
          set -euo pipefail
          python - <<'PY'
          import re
          import subprocess
          import sys
          from pathlib import Path

          patterns = [
              ("OpenAI API key", re.compile(r"(?:sk-[A-Za-z0-9]{20,}|sk-(?:proj|svcacct)-[A-Za-z0-9_-]{20,})")),
              ("Anthropic API key", re.compile(r"sk-ant-[A-Za-z0-9_-]{20,}")),
              ("GitHub token", re.compile(r"gh[pousr]_[A-Za-z0-9_]{36,}")),
              ("GitHub fine-grained token", re.compile(r"github_pat_[A-Za-z0-9_]{80,}")),
              ("AWS access key", re.compile(r"AKIA[0-9A-Z]{16}")),
              ("Slack token", re.compile(r"xox[baprs]-[A-Za-z0-9-]{20,}")),
              ("private key block", re.compile(r"-----BEGIN (?:RSA |DSA |EC |OPENSSH )?PRIVATE KEY-----")),
          ]

          tracked_files = subprocess.check_output(["git", "ls-files"], text=True).splitlines()
          findings = []
          for filename in tracked_files:
              path = Path(filename)
              try:
                  text = path.read_text(encoding="utf-8")
              except UnicodeDecodeError:
                  continue

              for line_number, line in enumerate(text.splitlines(), start=1):
                  for label, pattern in patterns:
                      if pattern.search(line):
                          findings.append((filename, line_number, label))

          if findings:
              print("Potential committed secrets found. Matched values are intentionally omitted.")
              for filename, line_number, label in findings:
                  print(f"{filename}:{line_number}: {label}")
              sys.exit(1)

          print("No high-confidence committed secret patterns found")
          PY

      # Verifies workflows do not use broad write-all permissions or floating
      # action refs such as @main/@master. This workflow owns lint/security, so
      # it enforces read-only permissions for itself without editing tests.yml.
      - name: Check workflow permission and action reference hygiene
        run: |
          set -euo pipefail
          python - <<'PY'
          import re
          import sys
          from pathlib import Path

          workflow_paths = sorted(Path(".github/workflows").glob("*.yml")) + sorted(
              Path(".github/workflows").glob("*.yaml")
          )
          failures = []

          for path in workflow_paths:
              text = path.read_text(encoding="utf-8")
              if re.search(r"(?m)^\s*permissions:\s*write-all\s*$", text):
                  failures.append(f"{path}: uses permissions: write-all")
              if re.search(r"(?m)^\s*contents:\s*write\s*$", text):
                  failures.append(f"{path}: requests contents: write")
              for line_number, line in enumerate(text.splitlines(), start=1):
                  match = re.search(r"uses:\s*([^@\s]+)(?:@([^\s#]+))?", line)
                  if not match:
                      continue
                  action_ref = match.group(2)
                  if not action_ref:
                      failures.append(f"{path}:{line_number}: action has no pinned ref")
                  elif action_ref in {"main", "master", "HEAD"}:
                      failures.append(f"{path}:{line_number}: action uses floating ref @{action_ref}")

          self_text = Path(".github/workflows/lint-security.yml").read_text(encoding="utf-8")
          if "permissions:\n  contents: read" not in self_text:
              failures.append("lint-security.yml must keep minimal contents: read permissions")

          if failures:
              for failure in failures:
                  print(failure)
              sys.exit(1)

          print("Workflow permission and action reference hygiene check passed")
          PY

      # Prevents accidentally committing large logs, browser traces, reports, or
      # artifact bundles that make workflow output and repository clones noisy.
      - name: Check for oversized checked-in artifacts and logs
        run: |
          set -euo pipefail
          python - <<'PY'
          import subprocess
          import sys
          from pathlib import Path

          max_bytes = 2 * 1024 * 1024
          artifact_suffixes = {
              ".har",
              ".log",
              ".tar",
              ".tgz",
              ".trace",
              ".zip",
          }
          artifact_dirs = {
              ".pytest_cache",
              ".ruff_cache",
              "__pycache__",
              "coverage",
              "playwright-report",
              "test-results",
          }

          tracked_files = subprocess.check_output(["git", "ls-files"], text=True).splitlines()
          failures = []
          for filename in tracked_files:
              path = Path(filename)
              if any(part in artifact_dirs for part in path.parts):
                  failures.append(f"{filename}: generated cache/report directory is tracked")
                  continue
              if path.suffix in artifact_suffixes:
                  failures.append(f"{filename}: log/artifact-like file is tracked")
                  continue
              size = path.stat().st_size
              if size > max_bytes:
                  failures.append(f"{filename}: {size} bytes exceeds {max_bytes} byte limit")

          if failures:
              for failure in failures:
                  print(failure)
              sys.exit(1)

          print("No oversized tracked artifacts or logs found")
          PY
