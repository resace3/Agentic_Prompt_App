name: Agentic Prompt App
slug: agentic_prompt_app
description: Flask prompt conversation app with saved chats, OpenAI/Claude models, mapped Home Assistant history, markdown tables, labeled plots, and read-only sleep summaries
version: "0.5.12"
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
url: https://github.com/resace3/Agentic_Prompt_App
startup: services
boot: auto
init: false
homeassistant_api: true
ingress: true
ingress_port: 5000
panel_icon: mdi:chat-processing
panel_title: Prompt Flow
webui: http://[HOST]:[PORT:5000]
ports:
  5000/tcp: 5000
ports_description:
  5000/tcp: Prompt Flow web interface
map:
  - config:ro
options: {}
schema: {}
